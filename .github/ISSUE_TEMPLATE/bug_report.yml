name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!

  - type: input
    id: version
    attributes:
      label: pw-insight version
      placeholder: "e.g. 1.0.0 — run pw-insight --version"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.4 — run python3 --version"
    validations:
      required: true

  - type: dropdown
    id: report-format
    attributes:
      label: Playwright report format
      options:
        - HTML report (playwright-report/ directory)
        - JSON report (results.json)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pw-insight --report ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Terminal output
      render: shell
